<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talklet - Student Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffff, #1ecea8);
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }

        /* LEFT PANEL - Chat List */
        .chat-list-panel {
            flex: 0 0 30%;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .chat-list-header {
            padding: 25px 20px;
            background: linear-gradient(135deg, #1ecea8, #17a589);
            color: white;
        }

        .chat-list-header h1 {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .search-bar {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            outline: none;
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.8);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .new-chat-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .chat-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .chat-list-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-list-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-list-container::-webkit-scrollbar-thumb {
            background: #1ecea8;
            border-radius: 10px;
        }

        .chat-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-item:hover {
            background: rgba(30, 206, 168, 0.1);
        }

        .chat-item.active {
            background: rgba(30, 206, 168, 0.15);
            border-left-color: #1ecea8;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1ecea8, #17a589);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            font-size: 15px;
            color: #333;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-last-msg {
            font-size: 13px;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-time {
            font-size: 11px;
            color: #999;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* RIGHT PANEL - Chat Area */
        .chat-area-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 25px;
            background: linear-gradient(135deg, #1ecea8, #17a589);
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
        }

        .chat-header-info h2 {
            font-size: 18px;
            margin-bottom: 2px;
        }

        .chat-header-info p {
            font-size: 13px;
            opacity: 0.9;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #1ecea8;
            border-radius: 10px;
        }

        .message-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .message-wrapper.sent {
            flex-direction: row-reverse;
        }

        .message-bubble {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            position: relative;
        }

        .message-wrapper.sent .message-bubble {
            background: linear-gradient(135deg, #1ecea8, #17a589);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-wrapper.received .message-bubble {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-content {
            font-size: 14px;
            line-height: 1.4;
        }

        .message-image {
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .message-file-name {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }

        .message-wrapper.sent .message-time {
            color: rgba(255, 255, 255, 0.8);
        }

        .message-input-area {
            padding: 20px 25px;
            background: #f8f8f8;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .message-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            background: white;
        }

        .message-input:focus {
            border-color: #1ecea8;
            box-shadow: 0 0 0 3px rgba(30, 206, 168, 0.1);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #1ecea8, #17a589);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(30, 206, 168, 0.3);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            padding: 25px;
            background: linear-gradient(135deg, #1ecea8, #17a589);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 22px;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-search {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .modal-search input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }

        .modal-search input:focus {
            border-color: #1ecea8;
        }

        .contacts-list {
            max-height: 400px;
            overflow-y: auto;
            padding: 10px 0;
        }

        .contact-item {
            padding: 15px 25px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .contact-item:hover {
            background: rgba(30, 206, 168, 0.1);
        }

        .contact-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1ecea8, #17a589);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .contact-name {
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }

        .contact-roll {
            font-size: 13px;
            color: #666;
            margin-top: 2px;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(30, 206, 168, 0.2);
            border-top-color: #1ecea8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* Welcome Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .welcome-screen h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #666;
        }

        .welcome-screen p {
            font-size: 14px;
        }

        /* Load More Button */
        .load-more-btn {
            width: 100%;
            padding: 10px;
            border: none;
            background: rgba(30, 206, 168, 0.1);
            color: #1ecea8;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .load-more-btn:hover {
            background: rgba(30, 206, 168, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
                padding: 10px;
                gap: 10px;
            }

            .chat-list-panel {
                flex: 0 0 40%;
            }

            .chat-area-panel {
                flex: 1;
            }

            .message-bubble {
                max-width: 80%;
            }
        }

        /* Date Separator */
        .date-separator {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .date-separator span {
            background: #e0e0e0;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- LEFT PANEL - Chat List -->
        <div class="chat-list-panel">
            <div class="chat-list-header">
                <h1>Talklet</h1>
                <input type="text" class="search-bar" id="chatSearchBar" placeholder="Search chats...">
                <button class="new-chat-btn" onclick="openNewChatModal()">➕ New Chat</button>
            </div>
            <div class="chat-list-container" id="chatListContainer">
                <div class="loading-container">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL - Chat Area -->
        <div class="chat-area-panel">
            <div id="welcomeScreen" class="welcome-screen">
                <div class="welcome-icon">💬</div>
                <h2>Welcome to Talklet</h2>
                <p>Select a chat to start messaging</p>
            </div>
            <div id="chatArea" style="display: none; height: 100%; display: flex; flex-direction: column;">
                <div class="chat-header" id="chatHeader">
                    <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
                    <div class="chat-header-info">
                        <h2 id="chatHeaderName"></h2>
                        <p id="chatHeaderStatus">Online</p>
                    </div>
                </div>
                <div class="messages-container" id="messagesContainer">
                    <!-- Messages will be rendered here -->
                </div>
                <div class="message-input-area">
                    <input type="text" class="message-input" id="messageInput" placeholder="Type a message...">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- New Chat Modal -->
    <div class="modal" id="newChatModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>New Chat</h2>
                <button class="close-modal" onclick="closeNewChatModal()">×</button>
            </div>
            <div class="modal-search">
                <input type="text" id="contactSearchBar" placeholder="Search contacts...">
            </div>
            <div class="contacts-list" id="contactsList">
                <div class="loading-container">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Application State
        let currentUserId = localStorage.getItem('currentUserId') || '23ucs145'; // Replace with actual login user
        let activeContactId = null;
        let chatList = [];
        let allContacts = [];
        let socket = null;
        let offset = 0;
        let isLoadingMore = false;
        let currentChatMessages = [];

        // Initialize Application
        function init() {
            connectWebSocket();
            loadChatList();
            setupEventListeners();
        }

        // Setup Event Listeners
        function setupEventListeners() {
            // Message input Enter key
            document.getElementById('messageInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            // Chat search
            document.getElementById('chatSearchBar').addEventListener('input', function(e) {
                filterChatList(e.target.value);
            });

            // Contact search
            document.getElementById('contactSearchBar').addEventListener('input', function(e) {
                filterContacts(e.target.value);
            });

            // Messages scroll for pagination
            document.getElementById('messagesContainer').addEventListener('scroll', function(e) {
                if (e.target.scrollTop === 0 && !isLoadingMore && activeContactId) {
                    loadMoreMessages();
                }
            });
        }

        // WebSocket Connection
        function connectWebSocket() {
            socket = new WebSocket('ws://localhost:8989/talklet/ws');

            socket.onopen = function() {
                console.log('WebSocket connected');
            };

            socket.onmessage = function(event) {
                const message = JSON.parse(event.data);
                handleIncomingMessage(message);
            };

            socket.onerror = function(error) {
                console.error('WebSocket error:', error);
            };

            socket.onclose = function() {
                console.log('WebSocket disconnected. Reconnecting...');
                setTimeout(connectWebSocket, 3000);
            };
        }

        // Load Chat List
        async function loadChatList() {
            try {
                const response = await fetch('http://localhost:8989/talklet/get-all-chatlist');
                chatList = await response.json();
                renderChatList(chatList);

                // Auto-open first chat
                if (chatList.length > 0) {
                    openChat(chatList[0].contact_id, chatList[0].contact_name);
                }
            } catch (error) {
                console.error('Error loading chat list:', error);
                document.getElementById('chatListContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No chats yet</p>
                    </div>
                `;
            }
        }

        // Render Chat List
        function renderChatList(chats) {
            const container = document.getElementById('chatListContainer');
            
            if (chats.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No chats yet</p>
                        <p style="font-size: 12px; margin-top: 10px;">Start a new conversation</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = chats.map(chat => {
                const name = chat.contact_name || chat.group_name || 'Unknown';
                const lastMsg = chat.last_msg || 'No messages yet';
                const time = formatTime(chat.created_at);
                const avatar = getInitials(name);
                const isActive = chat.contact_id === activeContactId;

                return `
                    <div class="chat-item ${isActive ? 'active' : ''}" onclick="openChat('${chat.contact_id}', '${name}')">
                        <div class="chat-avatar">${avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${name}</div>
                            <div class="chat-last-msg">${lastMsg}</div>
                        </div>
                        <div class="chat-time">${time}</div>
                    </div>
                `;
            }).join('');
        }

        // Filter Chat List
        function filterChatList(query) {
            const filtered = chatList.filter(chat => {
                const name = chat.contact_name || chat.group_name || '';
                return name.toLowerCase().includes(query.toLowerCase());
            });
            renderChatList(filtered);
        }

        // Open Chat
        async function openChat(contactId, contactName) {
            activeContactId = contactId;
            offset = 0;
            currentChatMessages = [];

            // Update UI
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatArea').style.display = 'flex';
            document.getElementById('chatHeaderName').textContent = contactName;
            document.getElementById('chatHeaderAvatar').textContent = getInitials(contactName);

            // Update active state in chat list
            renderChatList(chatList);

            // Load messages
            await loadChatHistory(contactId);
        }

        // Load Chat History
        async function loadChatHistory(contactId) {
            try {
                const response = await fetch(`http://localhost:8989/talklet/chat-history/${contactId}?limit=60&offset=${offset}`);
                const messages = await response.json();
                
                currentChatMessages = [...messages.reverse(), ...currentChatMessages];
                renderMessages(currentChatMessages);
                
                // Scroll to bottom on initial load
                if (offset === 0) {
                    scrollToBottom();
                }
            } catch (error) {
                console.error('Error loading chat history:', error);
                document.getElementById('messagesContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <p>No messages yet</p>
                        <p style="font-size: 12px; margin-top: 10px;">Start the conversation</p>
                    </div>
                `;
            }
        }

        // Load More Messages (Pagination)
        async function loadMoreMessages() {
            if (isLoadingMore) return;
            
            isLoadingMore = true;
            const container = document.getElementById('messagesContainer');
            const scrollHeight = container.scrollHeight;
            
            offset += 60;
            
            try {
                const response = await fetch(`http://localhost:8989/talklet/chat-history/${activeContactId}?limit=60&offset=${offset}`);
                const messages = await response.json();
                
                if (messages.length > 0) {
                    currentChatMessages = [...messages.reverse(), ...currentChatMessages];
                    renderMessages(currentChatMessages);
                    
                    // Maintain scroll position
                    container.scrollTop = container.scrollHeight - scrollHeight;
                }
            } catch (error) {
                console.error('Error loading more messages:', error);
            } finally {
                isLoadingMore = false;
            }
        }

        // Render Messages
        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <p>No messages yet</p>
                        <p style="font-size: 12px; margin-top: 10px;">Start the conversation</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map((msg, index) => {
                const isSent = msg.sender_id === currentUserId;
                const time = formatMessageTime(msg.created_at);
                
                let content = '';
                if (msg.type === 'text/plain') {
                    content = `<div class="message-content">${escapeHtml(msg.content)}</div>`;
                } else if (msg.type === 'media' && msg.meta_data) {
                    const isImage = msg.meta_data.mime_type && msg.meta_data.mime_type.startsWith('image/');
                    if (isImage) {
                        content = `
                            <img src="${msg.meta_data.file_url}" alt="${msg.meta_data.file_name}" class="message-image">
                            <div class="message-file-name">${msg.meta_data.file_name}</div>
                        `;
                    } else {
                        content = `
                            <div class="message-content">📎 ${msg.meta_data.file_name}</div>
                        `;
                    }
                }

                return `
                    <div class="message-wrapper ${isSent ? 'sent' : 'received'}">
                        <div class="message-bubble">
                            ${content}
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Send Message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content || !activeContactId || !socket) return;

            const message = {
                receiver_id: activeContactId,
                content: content,
                type: 'text/plain'
            };

            // Send via WebSocket
            socket.send(JSON.stringify(message));

            // Optimistic update
            const localMessage = {
                msg_id: Date.now().toString(),
                sender_id: currentUserId,
                receiver_id: activeContactId,
                type: 'text/plain',
                content: content,
                created_at: new Date().toISOString()
            };

            currentChatMessages.push(localMessage);
            renderMessages(currentChatMessages);
            scrollToBottom();

            // Clear input
            input.value = '';

            // Update chat list
            updateChatListPreview(activeContactId, content);
        }

        // Handle Incoming Message
        function handleIncomingMessage(message) {
            // Update chat list preview
            updateChatListPreview(message.sender_id, message.content);

            // If message is for active chat, append it
            if (message.sender_id === activeContactId || message.receiver_id === activeContactId) {
                currentChatMessages.push(message);
                renderMessages(currentChatMessages);
                scrollToBottom();
            }
        }

        // Update Chat List Preview
        function updateChatListPreview(contactId, lastMsg) {
            const chatIndex = chatList.findIndex(chat => chat.contact_id === contactId);
            
            if (chatIndex !== -1) {
                // Update existing chat
                chatList[chatIndex].last_msg = lastMsg;
                chatList[chatIndex].created_at = new Date().toISOString();
                
                // Move to top
                const chat = chatList.splice(chatIndex, 1)[0];
                chatList.unshift(chat);
            } else {
                // New chat - reload chat list
                loadChatList();
                return;
            }

            renderChatList(chatList);
        }

        // New Chat Modal Functions
        function openNewChatModal() {
            document.getElementById('newChatModal').classList.add('show');
            loadAllContacts();
        }

        function closeNewChatModal() {
            document.getElementById('newChatModal').classList.remove('show');
        }

        async function loadAllContacts() {
            try {
                const response = await fetch('http://localhost:8989/talklet/get-all-contacts');
                allContacts = await response.json();
                renderContacts(allContacts);
            } catch (error) {
                console.error('Error loading contacts:', error);
                document.getElementById('contactsList').innerHTML = `
                    <div class="empty-state">
                        <p>Failed to load contacts</p>
                    </div>
                `;
            }
        }

        function renderContacts(contacts) {
            const container = document.getElementById('contactsList');
            
            if (contacts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <p>No contacts found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = contacts.map(contact => {
                const avatar = getInitials(contact.name);
                return `
                    <div class="contact-item" onclick="startNewChat('${contact.roll_no}', '${contact.name}')">
                        <div class="contact-avatar">${avatar}</div>
                        <div>
                            <div class="contact-name">${contact.name}</div>
                            <div class="contact-roll">${contact.roll_no}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterContacts(query) {
            const filtered = allContacts.filter(contact => {
                return contact.name.toLowerCase().includes(query.toLowerCase()) ||
                       contact.roll_no.toLowerCase().includes(query.toLowerCase());
            });
            renderContacts(filtered);
        }

        function startNewChat(rollNo, name) {
            closeNewChatModal();
            openChat(rollNo, name);
        }

        // Utility Functions
        function getInitials(name) {
            if (!name) return '?';
            const parts = name.trim().split(' ');
            if (parts.length >= 2) {
                return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
            }
            return name.substring(0, 2).toUpperCase();
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            
            const date = new Date(timestamp);
            const now = new Date();
            const diffInMs = now - date;
            const diffInHours = diffInMs / (1000 * 60 * 60);

            if (diffInHours < 24) {
                return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            } else if (diffInHours < 48) {
                return 'Yesterday';
            } else {
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }
        }

        function formatMessageTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize app when page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
